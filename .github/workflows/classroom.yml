name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Test 1
      id: test-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 1
        setup-command: ''
        command: gcc sjf.c -o sjf && ./sjf
        input: |-
          4
          P1 0 6
          P2 1 8
          P3 2 7
          P4 3 3
        expected-output: |-
          Waiting Time:
          P1 0
          P2 15
          P3 7
          P4 3
          Turnaround Time:
          P1 6
          P2 23
          P3 14
          P4 6
          Average Waiting Time: 6.25
          Average Turnaround Time: 12.25
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 2
      id: test-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 2
        setup-command: ''
        command: gcc sjf.c -o sjf && ./sjf
        input: |-
          3
          P1 0 5
          P2 1 3
          P3 2 2
        expected-output: |-
          Waiting Time:
          P1 0
          P2 6
          P3 3
          Turnaround Time:
          P1 5
          P2 9
          P3 5
          Average Waiting Time: 3.00
          Average Turnaround Time: 6.33
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 3
      id: test-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 3
        setup-command: ''
        command: gcc sjf.c -o sjf && ./sjf
        input: |-
          4
          P1 0 4
          P2 0 3
          P3 0 1
          P4 0 2
        expected-output: |-
          Waiting Time:
          P1 6
          P2 3
          P3 0
          P4 1
          Turnaround Time:
          P1 10
          P2 6
          P3 1
          P4 3
          Average Waiting Time: 2.50
          Average Turnaround Time: 5.00
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 4
      id: test-4
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 4
        setup-command: ''
        command: gcc sjf.c -o sjf && ./sjf
        input: |-
          3
          P1 2 4
          P2 3 2
          P3 4 1
        expected-output: |-
          Waiting Time:
          P1 0
          P2 4
          P3 2
          Turnaround Time:
          P1 4
          P2 6
          P3 3
          Average Waiting Time: 2.00
          Average Turnaround Time: 4.33
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Test 5
      id: test-5
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test 5
        setup-command: ''
        command: gcc sjf.c -o sjf && ./sjf
        input: |-
          5
          P1 0 3
          P2 1 5
          P3 2 2
          P4 3 4
          P5 4 1
        expected-output: |-
          Waiting Time:
          P1 0
          P2 9
          P3 1
          P4 3
          P5 1
          Turnaround Time:
          P1 3
          P2 14
          P3 3
          P4 7
          P5 2
          Average Waiting Time: 2.80
          Average Turnaround Time: 5.80
        comparison-method: exact
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST-1_RESULTS: "${{steps.test-1.outputs.result}}"
        TEST-2_RESULTS: "${{steps.test-2.outputs.result}}"
        TEST-3_RESULTS: "${{steps.test-3.outputs.result}}"
        TEST-4_RESULTS: "${{steps.test-4.outputs.result}}"
        TEST-5_RESULTS: "${{steps.test-5.outputs.result}}"
      with:
        runners: test-1,test-2,test-3,test-4,test-5
